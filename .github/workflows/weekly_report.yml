name: BillingPlatform Weekly Demand Gen Report

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 8:00 AM UTC
  workflow_dispatch:
    inputs:
      report_month_override:
        description: "Force a specific month (YYYY-MM). Leave blank for current month to date."
        required: false
        default: ""

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send report
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          REPORT_MONTH_OVERRIDE: ${{ inputs.report_month_override }}
          USE_PRIOR_MONTH: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: python src/main.py

      - name: Upload report as workflow artifact
        if: always()  # Upload even if email fails
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: "*.xlsx"
          retention-days: 90
